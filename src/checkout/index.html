<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>
      Sleep Outside | Checkout
    </title>

    <link
      rel="stylesheet"
      href="../css/style.css"
    />

    <script
      type="module"
      src="../js/checkout.js"
    ></script>
  </head>

  <body>
    <header id="main-header"></header>

    <main class="divider">
      <h2>
        Review & Place Your Order
      </h2>

      <div class="checkout-container">

        <form
  id="checkout-form"
  class="checkout-form"
  novalidate
>

  <p
    id="form-errors"
    class="form-errors"
  ></p>

  <fieldset>
    <legend>
      Customer Information
    </legend>

    <label for="fname">
      First Name

      <input
        id="fname"
        type="text"
        name="fname"
        minlength="2"
        maxlength="30"
        required
      />
    </label>

    <label for="lname">
      Last Name

      <input
        id="lname"
        type="text"
        name="lname"
        minlength="2"
        maxlength="30"
        required
      />
    </label>
  </fieldset>

  <fieldset>
    <legend>
      Shipping Address
    </legend>

    <label for="street">
      Street Address

      <input
        id="street"
        type="text"
        name="street"
        minlength="5"
        required
      />
    </label>

    <label for="city">
      City

      <input
        id="city"
        type="text"
        name="city"
        minlength="2"
        required
      />
    </label>

    <label for="state">
      State

      <input
        id="state"
        type="text"
        name="state"
        minlength="2"
        maxlength="2"
        placeholder="ID"
        required
      />
    </label>

    <label for="zip">
      ZIP Code

      <input
        id="zip"
        type="text"
        name="zip"
        pattern="[0-9]{5}"
        maxlength="5"
        placeholder="83440"
        required
      />
    </label>
  </fieldset>

  <fieldset>
    <legend>
      Payment Details
    </legend>

    <label for="cardNumber">
      Card Number

      <input
        id="cardNumber"
        type="text"
        name="cardNumber"
        pattern="[0-9]{16}"
        maxlength="16"
        placeholder="1234123412341234"
        required
      />
    </label>

    <label for="expiration">
      Expiration Date

      <input
        id="expiration"
        type="text"
        name="expiration"
        placeholder="08/27"
        pattern="(0[1-9]|1[0-2])\/[0-9]{2}"
        required
      />
    </label>

    <label for="code">
      Security Code

      <input
        id="code"
        type="text"
        name="code"
        pattern="[0-9]{3}"
        maxlength="3"
        placeholder="123"
        required
      />
    </label>
  </fieldset>

  <button
    type="submit"
    class="checkout-btn"
  >
    Complete Purchase
  </button>

</form>

        <aside class="order-summary">

          <h3>
            Order Summary
          </h3>

          <div class="summary-row">
            <span>
              Subtotal
            </span>

            <span id="subtotal">
              $0.00
            </span>
          </div>

          <div class="summary-row">
            <span>
              Shipping
            </span>

            <span id="shipping">
              $0.00
            </span>
          </div>

          <div class="summary-row">
            <span>
              Tax
            </span>

            <span id="tax">
              $0.00
            </span>
          </div>

          <div
            class="summary-row summary-total"
          >
            <span>
              Total
            </span>

            <span id="orderTotal">
              $0.00
            </span>
          </div>

        </aside>

      </div>
    </main>

    <footer id="main-footer"></footer>
  </body>
</html>
